name: Deploy mdBook
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook (Fast)
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Build Book
        run: mdbook build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './book'
      - uses: actions/deploy-pages@v4
